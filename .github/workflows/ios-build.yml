name: Build APK + IPA

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  build-android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release --android-skip-build-dependency-validation
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonaris-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
      - name: Upload APK to release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: build/app/outputs/flutter-apk/app-release.apk
          tag: v1.0
          allowUpdates: true
          body: "Sonaris App - Detección de acordes con IA (SVM + Chroma)"

  build-ios:
    name: 🍎 iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
      - run: flutter pub get
      - run: pod repo update
        working-directory: ios
      - name: Disable codesigning in Xcode project
        run: |
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer"/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = ""/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' '/DEVELOPMENT_TEAM/d' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
      - run: flutter build ios --release --no-codesign
      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonaris-release.ipa
          path: build/ios/iphoneos/FlutterIpaExport.ipa
      - name: Upload IPA to release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          allowUpdates: true
          body: "Sonaris App - Detección de acordes con IA (SVM + Chroma)"
